server {
    listen 80;
    server_name work-for-everyone.ru www.work-for-everyone.ru;

    # ACME challenge для certbot
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    # Временно: прокси на фронт пока нет сертификата
    location / {
        proxy_pass http://frontend:3000;
    }
}

