server {
    listen 80;
    server_name _;

    # Размер тела запроса (для форм и загрузки файлов)
    client_max_body_size 10m;

    # Таймауты для Next.js SSR
    proxy_read_timeout 60s;
    proxy_connect_timeout 10s;
    proxy_send_timeout 60s;

    # Общие заголовки для проксирования
    proxy_http_version 1.1;
    proxy_set_header Host              $host;
    proxy_set_header X-Real-IP         $remote_addr;
    proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;

    # WebSocket (Next.js HMR dev, но не навредит в prod)
    proxy_set_header Upgrade    $http_upgrade;
    proxy_set_header Connection "upgrade";

    # Увеличенный таймаут для LLM-эндпоинтов (ассистент может отвечать >60 сек)
    location /api/v1/assistant/ {
        proxy_pass http://frontend:3000;
        proxy_read_timeout 300s;
        proxy_send_timeout 300s;
    }

    # Весь трафик — во фронтенд.
    # Next.js сам проксирует /api/auth/* и /api/v1/* на бэкенды.
    location / {
        proxy_pass http://frontend:3000;
    }
}
