version: '3.7'

services:

  # ── База данных ────────────────────────────────────────────────────────────
  db:
    image: postgres:16-alpine
    container_name: backend_service_db
    env_file: ./backend/.env
    restart: always
    volumes:
      - pg_data:/var/lib/postgresql/data
    ports:
      - "5434:5432"
    networks:
      - wfe_network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_NAME"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Backend (FastAPI) ─────────────────────────────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: backend_service
    env_file: ./backend/.env
    restart: always
    command: bash entrypoint.sh
    networks:
      - wfe_network
    depends_on:
      db:
        condition: service_healthy

  # ── Frontend (Next.js) ─────────────────────────────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: wfe_frontend
    env_file: ./frontend/.env.local
    restart: unless-stopped
    networks:
      - wfe_network
    depends_on:
      - backend

  # ── Nginx для фронтенда (порты 80 + 443) ─────────────────────────────────
  nginx_frontend:
    image: nginx:alpine
    container_name: frontend_nginx
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - certbot_certs:/etc/letsencrypt:ro
      - certbot_www:/var/www/certbot
    restart: unless-stopped
    networks:
      - wfe_network
    depends_on:
      - frontend

  # ── Certbot (обновление SSL через cron на хосте) ─────────────────────────
  certbot:
    image: certbot/certbot
    container_name: wfe_certbot
    volumes:
      - certbot_certs:/etc/letsencrypt
      - certbot_www:/var/www/certbot

  # ── Nginx для бекенда (порт 91) ────────────────────────────────────────────
  nginx_backend:
    image: nginx:alpine
    container_name: backend_nginx
    ports:
      - "91:80"
    volumes:
      - ./backend/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    restart: always
    networks:
      - wfe_network
    depends_on:
      - backend

volumes:
  pg_data:
  certbot_certs:
  certbot_www:

networks:
  wfe_network:
    driver: bridge
